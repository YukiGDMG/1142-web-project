<script type="text/javascript">
    $(function(){
        // ======== 1. 回首頁收合動畫（保留） ========
        if (window.location.hash === "#home-back") {
            history.replaceState(null, document.title, window.location.pathname);
            $("ul.subs:visible").slideUp(500);
            setTimeout(function() {
                $("div.main").removeClass("open");
                sessionStorage.removeItem("openMenu");
            }, 500); 
        }

        // ======== 2. 絕對不會失敗的原生暗黑切換 ========
        // 讀取記憶：如果以前設定過暗黑，就加上 class
        if (localStorage.getItem("theme") === "dark") {
            $("body").addClass("dark-theme");
            $("#custom-dark-btn").text("☀️ Light");
        }

        // 點擊切換事件
        $("#custom-dark-btn").on("click", function(e) {
            e.preventDefault(); 
            
            // 啪一聲！直接在 body 身上切換 dark-theme 類別
            $("body").toggleClass("dark-theme");
            
            // 同步文字與寫入記憶
            if ($("body").hasClass("dark-theme")) {
                $(this).text("☀️ Light");
                localStorage.setItem("theme", "dark");
            } else {
                $(this).text("🌓 Dark");
                localStorage.setItem("theme", "light");
            }
        });
    });
</script>
